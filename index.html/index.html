<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Taller Final js con Consumo de API</title>

  <!-- GOOGLE FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>Taller Final JavaScript</h1>
    <p>Consumo de una API pública usando fetch, async/await y manipulación del DOM.</p>
  </header>

  <!-- MAIN -->
  <main>
    <div class="acciones">
      <input type="text" id="buscador" placeholder="Buscar por nombre">
      <button id="btnCargar">Cargar usuarios</button>
    </div>

    <p id="estado"></p>

    <!-- CONTENEDOR DONDE JS INSERTA LAS TARJETAS -->
    <div id="resultados" class="contenedor"></div>
  </main>

  <!-- FOOTER -->
  <footer>
    <p>Jose Fernando Villadiego - 2026</p>
  </footer>

  <!-- JS -->
  <script src="js/app.js"></script>
</body>
</html>
